# ---------------------------------------------------------------
# Diffusion UNet 1-D Low-Dim Policy  —  OpenCabinet
# ---------------------------------------------------------------
# Used by: 09_train_lowdim_unet.py, 07_evaluate_policy.py,
#          08_visualize_policy_rollout.py
#
# obs_dim  = 7 (eef_pos 3 + eef_quat 4) + 6 (handle feats) = 13
# action_dim = 7  (active action dims only: arm pos 3, rot 3, gripper 1)
#
# Dead/constant dims stripped:
#   obs:  base_pos(3), base_quat(4), gripper_qpos(2) = 9 dropped
#         handle_pos(3), handle_xaxis_z(1), hinge_dir(1) = 5 dropped
#   act:  dims 0-4 always [0,0,0,0,-1] = 5 dropped
# ---------------------------------------------------------------

obs_dim: 13
action_dim: 7

# Temporal horizons (in timesteps @ 20 Hz)
horizon: 16          # full trajectory length the UNet denoises
n_obs_steps: 2       # observation context window
n_action_steps: 8    # actions executed before re-planning

# --- ConditionalUnet1D architecture ---
# [64, 128, 256] — plenty of capacity for a 13-dim → 7-dim task.
policy:
  down_dims: [64, 128, 256]
  kernel_size: 5
  n_groups: 8
  diffusion_step_embed_dim: 128
  cond_predict_scale: false
  obs_as_global_cond: true
  obs_as_local_cond: false
  pred_action_steps_only: false

# --- DDPM noise scheduler ---
noise_scheduler:
  num_train_timesteps: 100
  beta_start: 0.0001
  beta_end: 0.02
  beta_schedule: squaredcos_cap_v2
  variance_type: fixed_small
  clip_sample: true
  prediction_type: epsilon
  num_inference_steps: 100

# --- Training ---
training:
  num_epochs: 100
  batch_size: 64
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  lr_scheduler: cosine
  lr_warmup_steps: 100
  gradient_accumulate_every: 1
  use_ema: true
  ema_decay: 0.999
  seed: 42
  val_every: 5
  checkpoint_every: 5
  max_train_steps: null
  max_val_steps: null

# --- Dataset ---
dataset:
  val_ratio: 0.10
  max_episodes: null

# --- DataLoader ---
dataloader:
  num_workers: 0
  pin_memory: false

# --- Checkpointing ---
checkpoint_dir: tmp/cabinet_policy_checkpoints/normalized_experiment
